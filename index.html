<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Thief & Police Board Game</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
</head>
<body>
  <div id="map"></div>

  <div id="ui">
    <button id="rollDice">Roll Dice</button>
    <span id="diceResult">-</span>
    <span id="turnInfo">Turn</span>
    <span id="treasureCount">0</span>
    <div id="message"></div>
  </div>

  <div id="eventCard">
    <div id="cardName"></div>
    <div id="cardType"></div>
    <div id="cardEffect"></div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="j/game.js"></script>
</body>
</html>
